//--------------------------------------------------------------
// Population Engine Configuration
// Runtime PC shells that fill maps with fake players.
// Source: src/map/population_engine.cpp
// Notes: 1=on/off switch, 2=milliseconds, 3=cells
//--------------------------------------------------------------

//--------------------------------------------------------------
// AI Behavior Flags (bitmask)
// Controls how intelligently population shells behave in combat.
// Add values together to enable multiple behaviors.
//--------------------------------------------------------------
// 0x001 - Chase refresh: re-evaluate path when target moves (every step)
// 0x002 - Target switch: can change target mid-combat if a closer enemy appears
// 0x004 - Skill while chasing: evaluate skills during approach, not just in range
// 0x008 - Reactive conditions: re-check skill conditions every tick (status changes)
// 0x010 - Flee on low HP: squishy roles retreat when HP < 30%
// 0x020 - Support priority: support roles heal allies before self-buff
// 0x040 - Pack behavior: shells share target info with nearby allies
// 0x080 - Kite: ranged jobs maintain max skill range instead of closing to melee
// 0x100 - Combo awareness: chain skills fire in sequence (Freeze→JT, Hide→Backstab)
// 0x200 - Boss avoidance: non-tank roles avoid targeting MVP/boss monsters 
//--------------------------------------------------------------
population_engine_ai: 0x3D2

// Daily behavior cycle for town shells. (Note 1)
// When enabled, town shells change behavior based on server hour:
//   06:00-17:59 = configured behavior (Combat/Wander/etc.)
//   18:00-21:59 = Social (wander + frequent chat + emotes)
//   22:00-05:59 = Sit (idle at current position)
// Field and dungeon shells are unaffected - they always use their configured behavior.
population_engine_daily_cycle: off

// Vending economy for Vendor-behavior shells. (Note 1)
// When enabled, Vendor shells open a real vend with common items priced at their
// NPC Buy value. Players can purchase from them. Prevents arbitrage because
// sell price < buy price in standard rAthena item_db.
population_engine_vending_enable: on

// LOS-gated forward-roam candidate attempts per shell movement step. (Default: 16, range: 1–256)
// Each attempt calls path_search_long (Bresenham) — cheap O(distance) vs A*. 16 is plenty
// for most field/dungeon maps; raise only if bots frequently stand still in very walled areas.
population_engine_path_attempts: 16

//--------------------------------------------------------------
// Global Limits
//--------------------------------------------------------------

// Hard cap on the total number of population shells that may exist at once.
// Autosummon and @populate both respect this limit. (Default: 1000)
population_engine_max_count: 10000

// Maximum shells spawned per autosummon timer tick across all profiles and maps. (Default: 50)
// The autosummon timer fires every ~10 seconds. With 1000 missing shells and batch_size 50,
// it takes ~200 seconds (20 ticks) to reach full population - spreading the load evenly.
// 0: unlimited - all missing shells spawn in a single tick (may cause a spike on first boot).
population_engine_autosummon_batch_size: 100

// YAML equipment loading strictness. (Note 1)
// off: warn and zero out invalid item/job references - other rows still load.
// on:  discard the entire equipment DB if any row fails validation.
population_engine_equipment_strict_load: off

// Global combat timer interval. Equivalent to mob_ai_hard (100 ms). (Default: 100) (Note 2)
population_engine_shell_timer_ms: 100

// Two-tier scheduling is now disabled - skill evaluation runs every tick.
// This value controls the per-shell minimum delay between consecutive skill uses.
// (Default: 200) (Note 2)
population_engine_shell_skill_interval_ms: 100

// Enable attack skill rotation. (Note 1)
// off: shells use melee only.
// on:  shells rotate through their configured attack skills.
population_engine_shell_attackskill: on

// Per-tick chance (0-100) a shell uses a basic attack instead of evaluating its skill picker.
// Default 30 means ~30% of attack ticks are forced melee even when high-Rate skills are queued.
// 0 = always try a skill (legacy — many YAML rotations have Rate:10000 entries that would
// otherwise monopolise every tick and the shell never basic-attacks).
// Bypassed when the shell has the SkillOnly flag set.
population_engine_shell_basic_attack_chance: 70

// Delay between attack skill uses per shell. (Default: 100) (Note 2)
population_engine_shell_attack_skill_delay_ms: 100

// SP-reserve floor as percent of max SP (0–99). 0 disables.
population_engine_shell_skill_min_sp_pct: 15

// Sticky-target commitment window. 0 = off. (2)
population_engine_shell_sticky_target_ms: 2000

// Pre-cast LOS gate - picker requires path_search_long(no-wall) to target. (1)
population_engine_shell_skill_los_check: on

// Strict skill-use gating - also require status_check_skilluse(). (1)
population_engine_shell_skill_strict_gate: on

// Wander step distance during combat roam (min/max). (3)
population_engine_shell_move_min: 7
population_engine_shell_move_max: 20

// How often the mob-detection cache refreshes per shell. (Default: 500) (Note 2)
population_engine_shell_mobtracker_interval_ms: 500

// Detection radius for finding hostile mobs. (Default: 30) (Note 3)
population_engine_shell_mdetection_cells: 30

// How long a detected target is cached before re-scanning. (Default: 1000) (Note 2)
population_engine_shell_detection_cache_ms: 500

// Use owner's state machine for movement decisions. (Note 1) (Default: on)
population_engine_shell_movement_owner_sm: on

//--------------------------------------------------------------
// Wander — Ambient Idle Movement
// Shells that are not in combat walk randomly around the map.
// Wander runs on the main map thread via a dedicated interval timer.
//--------------------------------------------------------------

population_engine_wander_enable: on

// How often the wander timer fires. (Default: 500) (Note 2)
population_engine_wander_tick_ms: 500

// Maximum shells that may start a new walk step per wander tick. (Default: 50)
population_engine_wander_max_per_tick: 50

// Maximum radius a shell may walk in one wander step. (Default: 12) (Note 3)
population_engine_wander_radius: 12

// Base cooldown between wander steps per shell. (Default: 2000) (Note 2)
population_engine_wander_cooldown_ms: 1000

// Random jitter added to the cooldown (0 to jitter ms, uniform). (Default: 1500) (Note 2)
population_engine_wander_cooldown_jitter_ms: 1000

//--------------------------------------------------------------
// Chat — Ambient Overhead Lines
// Shells say random lines from db/population_chat.yml on a cooldown.
// ChatProfile on a job row selects the profile; omitting it uses "default".
// Requires map-server restart after changes.
//--------------------------------------------------------------

// Enable ambient chat lines from shells. (Note 1)
population_engine_chat_enable: on

// How often the chat timer fires to check eligible shells. (Default: 1500) (Note 2)
population_engine_chat_tick_ms: 1500

// Maximum shells that may say a line per chat tick. (Default: 10)
population_engine_chat_max_per_tick: 10

// Minimum time between two lines from the same shell. (Default: 15000) (Note 2)
population_engine_chat_cooldown_ms: 15000

// Random jitter added to the per-shell chat cooldown. (Default: 5000) (Note 2)
population_engine_chat_cooldown_jitter_ms: 5000

// Whisper back and say a line when a player addresses a shell by name. (Note 1)
// Uses the same line pool and cooldown as ambient chat.
// Whisper back when a player addresses a shell by name. (1)
population_engine_chat_reply_enable: on

//--------------------------------------------------------------
// Visual — Hat Effect
// Sends ZC_EQUIPMENT_EFFECT when a shell enters autocombat.
// Same concept as HatEffect in db/autocombat_config.yml.
//--------------------------------------------------------------
// Hat-effect id sent to clients when shells start autocombat. (Default: 0)
// 0: inherit the HatEffect value from db/autocombat_config.yml (if > 0).
// Non-zero: override for population shells only.
// Valid ids must satisfy HAT_EF_MIN < id < HAT_EF_MAX on the client build.
population_engine_hat_effect: 56

// Bot name fallback. (Note 1) (Default: off)
// off: always generate a name from the syllable pool (deterministic fallback).
// on:  allow Bot_<id> names when the name pool is exhausted.
population_engine_name_bot_fallback: off
