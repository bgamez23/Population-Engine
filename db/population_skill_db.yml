      - { SkillId: PR_LEXAETERNA,   Level: 1,  Rate: 9000, Condition: not_enemy_status, CondValue: SC_AETERNA }
      - { SkillId: PR_LEXDIVINA,    Level: 10, Rate: 5000, Condition: not_enemy_status, CondValue: SC_SILENCE }
      - { SkillId: AL_HEAL,         Level: 10, Rate: 10000, Target: self, Condition: hp_below, CondValue: 40 }
      - { SkillId: AL_HEAL,         Level: 10, Rate: 10000, Target: ally, Condition: ally_hp_below, CondValue: 60 }
      - { SkillId: AL_BLESSING,     Level: 10, Rate: 8000, Target: ally, Condition: not_ally_status, CondValue: SC_BLESSING }
      - { SkillId: AL_INCAGI,       Level: 10, Rate: 8000, Target: ally, Condition: not_ally_status, CondValue: SC_INCREASEAGI }
      - { SkillId: PR_KYRIE,        Level: 10, Rate: 8000, Target: ally, Condition: not_ally_status, CondValue: SC_KYRIE }
      - { SkillId: PR_ASPERSIO,     Level: 5,  Rate: 7000, Target: ally, Condition: not_ally_status, CondValue: SC_ASPERSIO }
      - { SkillId: PR_IMPOSITIO,    Level: 5,  Rate: 7000, Target: self, Condition: not_self_status, CondValue: SC_IMPOSITIO }
