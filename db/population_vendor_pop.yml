###########################################################################
# Population Engine Database — Vendor population
###########################################################################
#
# Job entries for shells that act as overhead-message vendors.  Picked up by
# the VendorPlacement-driven autosummon pass for maps that have entries in
# db/population_vendors.yml (which configures the vendor inventory).
#
# Gear sets, profiles, and the arena job pool are defined in
# db/population_gear_sets.yml and shared across all three files.
#
###########################################################################

Header:
  Type: POPULATION_ENGINE_DB
  Version: 2

Body:

###########################################################################
# Profile - vendor shells.
###########################################################################

  - Profile: vendor_field_drops
    Jobs:
      Merchant    : para_merchant
      HighMerchant: para_merchant
    NameProfile: default
    Hair: [0, 42]
    HairColor: [0, 131]
    ClothesColor: [0, 699]
    Flags:
      - mortal
    TownBehavior: vendor
    VendorKey: "field_drops"
    Script: |
      setcart;

  - Profile: vendor_dungeon_drops
    Jobs:
      Blacksmith: para_merchant
      Whitesmith: para_merchant
    NameProfile: default
    Hair: [0, 42]
    HairColor: [0, 131]
    ClothesColor: [0, 699]
    Flags:
      - mortal
    TownBehavior: vendor
    VendorKey: "dungeon_drops"
    Script: |
      setcart;
