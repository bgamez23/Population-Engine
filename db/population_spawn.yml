###########################################################################
# Population Engine Spawn Database
###########################################################################
#
# Autosummon spawn map lists keyed by Profile name (matches a Profile:
# defined in db/population_engine.yml). At spawn time the engine resolves
# the profile to the list of jobs that inherit from it and randomly picks
# one job per shell, so a single entry covers every job in the profile.
#
# Vendors are NOT spawned through this database; they use VendorPlacement
# blocks in db/population_vendors.yml instead.
###########################################################################
# - Profile:                     Profile name (must be defined in population_engine.yml).
#   Towns:                       Map name list for towns category.
#   Fields:                      Map name list for fields category.
#   Dungeons:                    Map name list for dungeons category.
#   TownsPopulation:             Total target shell count across all Towns maps.
#   TownsMaxPerMap:              Hard cap per individual town map (0 = no cap, default).
#   FieldsPopulation:            Total target shell count across all Fields maps.
#   FieldsMaxPerMap:             Hard cap per individual field map (0 = no cap, default).
#   DungeonsPopulation:          Total target shell count across all Dungeons maps.
#   DungeonsMaxPerMap:           Hard cap per individual dungeon map (0 = no cap, default).
#     Each map gets floor(N/count) shells; first (N%count) maps get +1 to reach N exactly.
#     MaxPerMap clamps the per-map target after distribution (useful when one map in a large
#     list would otherwise absorb the entire remainder allocation).
#     0 or omit disables that category.
###########################################################################

