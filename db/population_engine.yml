###########################################################################
# Population Engine Database — Main (towns / fields / dungeons)
###########################################################################
#
# Job entries for novice, first-class, and second-class jobs only.
# Transcendent and expanded jobs live in db/population_pvp.yml.
# Vendor merchants live in db/population_vendor_pop.yml.
#
# Gear sets, profiles, and the arena job pool are defined in
# db/population_gear_sets.yml and shared across all three files.
#
###########################################################################
# PROFILE FIELD REFERENCE
###########################################################################
#
# Profile:       Unique profile name referenced by spawn entries.
# Jobs:          Map of JobName: GearSet.  GearSet keys come from
#                db/population_gear_sets.yml.  A job not listed here falls
#                back to the engine's built-in class default.
# NameProfile:   Name distribution profile (default = "default").
# ChatProfile:   Chat profile for ambient dialogue.
# Hair:          [min, max] range of hair style IDs.
# HairColor:     [min, max] range of hair colour IDs.
# ClothesColor:  [min, max] range of clothes colour IDs.
#
# Phase 2 — combat identity (omit to use engine defaults)
# ---------------------------------------------------------
# BaseLevel:     [min, max] base-level range assigned at spawn.
# JobLevel:      [min, max] job-level range assigned at spawn.
# Str/Agi/Vit/Int/Dex/Luk:  [min, max] raw stat ranges at spawn.
#                            All stats are clamped to [1, 99].
#
# Behaviour / movement
# ---------------------
# TownBehavior:    wander | guard | combat | idle
#   wander  — random walk within spawn radius (default in safe zones)
#   guard   — walk randomly within spawn radius, switch to combat on aggro
#   combat  — always seek targets; never wander
#   idle    — stand still; only attack if attacked first
# FieldBehavior:   same values as TownBehavior.
# DungeonBehavior: same values as TownBehavior.
#
# Movetype controls locomotion within a combat state:
#   -1  — does NOT move at all; acts as a stationary turret.
#    0  — melee brawler; closes distance and stays at touch range.
#    1  — ranged; maintains preferred distance (skill range – 1).
#    3  — hybrid; advances if no valid target in detection radius,
#          then chooses melee or ranged based on equipped weapon type.
#
# Role (AI priority hint):
#   none      — no priority override; behaves as a generic attacker.
#   tank      — prefers aggressive melee targets; taunts and body-blocks.
#   support   — prioritises heal / buff / resurrection skills.
#   attacker  — prioritises offensive skills; ignores defensive rotations.
#
# Flags (bitmask list; combine as a YAML sequence):
#   immortal    — shell cannot receive damage (default; safe for demos).
#   mortal      — shell takes damage and can die; triggers respawn timer.
#   attack_only — shell auto-attacks only; skill rotation is bypassed.
#   skill_only  — shell uses skills only; never auto-attacks.
#
# Script:  Inline NPC script executed once at shell spawn, before the
#          combat engine activates.  Use for mount / arrow setup:
#            Script: |
#              setriding;
#              setarrow;
#
###########################################################################

Header:
  Type: POPULATION_ENGINE_DB
  Version: 2

Body:

###########################################################################
# Profiles - town / field / dungeon (PvE) defaults.
# These mirror the structure of pvp profiles but are scoped to this file
# only so PvE tuning never leaks into PvP behaviour.
