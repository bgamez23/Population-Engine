  - Profile: novice_default
    Jobs:
      Novice: novice_set
    NameProfile: default
    ChatProfile: default
    Hair: [0, 42]
    HairColor: [0, 131]
    ClothesColor: [0, 699]
    Flags:
      - mortal
    TownBehavior: wander
    FieldBehavior: combat

