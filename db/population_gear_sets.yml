###########################################################################
# Population Engine — Shared Gear Sets Database
###########################################################################
#
# Loaded by every population engine database (main, pvp, vendor).
# Job entries reference these GearSets by name via:
#     GearSet: <name>
# so the same equipment pool can be shared across multiple jobs and files
# without duplication.
#
# Contains ONLY GearSetName entries.  Profiles are defined per-source:
#   - Pve profiles  → db/population_engine.yml
#   - PvP profiles  → db/population_pvp.yml
#   - Vendor profile → db/population_vendor_pop.yml
# The arena job pool is auto-derived from the entries in db/population_pvp.yml.
#
###########################################################################

