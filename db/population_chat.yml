###########################################################################
# Population Engine Chat Database
###########################################################################
#
# Map chat and whisper reply lines for population shells (UTF-8 or ASCII punctuation).
# Lines are referenced via ChatProfile: keys defined in population_engine.yml.
#
###########################################################################
# - ChatGlobal:                  Shared line categories available to all profiles.
#     Categories:                Map of category name to list of chat strings.
#       <name>: [ "line", ... ]  Each category holds one or more lines.
# - ChatProfile: <key>           Named profile; reference via ChatProfile: in population_engine.yml.
#     Categories: [ names ]      List of ChatGlobal category names to draw from (uniform random).
#
# Placeholders in lines: {name} {map} {job}
# Lines matching population_names.yml Blocklist entries are skipped (substring, case-insensitive).
###########################################################################

Header:
  Type: POPULATION_CHAT_DB
  Version: 1

